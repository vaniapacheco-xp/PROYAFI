<script>

const MIN = 10;

// AUTO GUARDADO
document.addEventListener("input", e=>{
if(e.target.matches("textarea,input,select")){
localStorage.setItem(e.target.id, e.target.value);
}
});

// ---------- VALIDACIONES ----------
function textoValido(id){
let v = (document.getElementById(id)?.value || "").trim();
return v.length >= MIN;
}

// ---------- FASE 1 ----------
function fase1Completa(){
let rol = document.getElementById("rol").value;
if(!rol) return false;

let campos = document.querySelectorAll("#camposRol textarea, #camposRol input");

for(let c of campos){
if(c.value.trim().length < MIN) return false;
}

return true;
}

// ---------- GUARDAR ----------
function guardar(){
document.querySelectorAll("textarea,input,select").forEach(t=>{
if(t.id) localStorage.setItem(t.id,t.value);
});
}

// ---------- EXPORTAR ----------
function exportar(){
guardar();

let data = {};
for(let i=0;i<localStorage.length;i++){
let k = localStorage.key(i);
data[k] = localStorage.getItem(k);
}

localStorage.setItem("descargado","true");

let blob = new Blob([JSON.stringify(data,null,2)]);
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "proyecto.json";
a.click();

alert("Archivo descargado correctamente");
}

// ---------- IMPORTAR ----------
function importarJSON(){
let file = document.getElementById("fileInput").files[0];
if(!file) return alert("Selecciona archivo");

let reader = new FileReader();
reader.onload = e=>{
let data = JSON.parse(e.target.result);

localStorage.setItem("companero","true");
localStorage.setItem("dataCompanero", JSON.stringify(data));

mostrarCompanero(data);

alert("Archivo cargado");
};
reader.readAsText(file);
}

function mostrarCompanero(data){
let div = document.getElementById("trabajoCompanero");
let html = "<h4>Trabajo recibido</h4>";

Object.keys(data).forEach(k=>{
if(k.startsWith("s")||k.startsWith("p")||k.startsWith("y")||k.startsWith("j")){
html += "<p><b>"+k+"</b>: "+data[k]+"</p>";
}
});

div.innerHTML = html;
}

// ---------- FASES ----------
function avanzarFase(n){

if(n===2){
if(!fase1Completa()) return alert("Completa tu rol");
if(localStorage.getItem("descargado")!=="true") return alert("Descarga tu JSON");
}

if(n===3){
if(localStorage.getItem("companero")!=="true") return alert("Carga JSON del compañero");
}

if(n===4){
if(!textoValido("v1")||!textoValido("v2")||!textoValido("v3")){
return alert("Completa validación cruzada");
}
}

localStorage.setItem("fase", n);
render();
}

// ---------- OMAR ----------
function validarOmar(){
if(!textoValido("o1")||!textoValido("o2")||!textoValido("o3")){
return alert("Completa análisis");
}

let decision = document.getElementById("o4").value;
if(!decision) return alert("Selecciona decisión");

if(decision==="aprobado"){
localStorage.setItem("fase",5);
alert("Aprobado");
}else{
alert("Rechazado, regresen");
}

render();
}

// ---------- RENDER ----------
function render(){
let fase = parseInt(localStorage.getItem("fase")||1);

for(let i=1;i<=5;i++){
let p = document.getElementById("panel-fase"+i);
if(i<=fase){
p.classList.remove("locked");
}else{
p.classList.add("locked");
}
}
}

// ---------- INICIO ----------
render();

</script>
